<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainPowers AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
}

.sidebar{
  width:250px;
  background:#111827;
  padding:20px;
}

.logo{
  font-size:28px;
  font-weight:bold;
  margin-bottom:30px;
  color:#60a5fa;
}

.new-chat{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-bottom:20px;
}

.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:20px;
  border-bottom:1px solid #334155;
  font-size:24px;
  font-weight:bold;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:75%;
  padding:15px;
  border-radius:12px;
  margin:15px 0;
  line-height:1.5;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.bot{
  background:#1e293b;
}

.input-area{
  display:flex;
  padding:20px;
  border-top:1px solid #334155;
}

input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
  outline:none;
}

button{
  margin-left:10px;
  padding:15px 25px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:16px;
}

@media(max-width:768px){

  .sidebar{
    display:none;
  }

  .message{
    max-width:90%;
  }

}

</style>
</head>

<body>

<div class="sidebar">

  <div class="logo">
    BrainPowers AI
  </div>

  <button class="new-chat" onclick="newChat()">
    + New Chat
  </button>

  <p>Your personal AI assistant 🚀</p>

</div>

<div class="chat-area">

  <div class="header">
    BrainPowers AI
  </div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      Hello 👋 I am BrainPowers AI. Ask me anything.
    </div>

  </div>

  <div class="input-area">

    <input
      type="text"
      id="userInput"
      placeholder="Ask anything..."
    >

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

</div>

<script>

const API_KEY = "PASTE_YOUR_API_KEY_HERE";

async function sendMessage(){

  const input =
    document.getElementById("userInput");

  const chatBox =
    document.getElementById("chatBox");

  const text = input.value;

  if(text.trim() === ""){
    return;
  }

  // USER MESSAGE
  const userMessage =
    document.createElement("div");

  userMessage.classList.add(
    "message","user"
  );

  userMessage.innerText = text;

  chatBox.appendChild(userMessage);

  input.value = "";

  // BOT MESSAGE
  const botMessage =
    document.createElement("div");

  botMessage.classList.add(
    "message","bot"
  );

  botMessage.innerText =
    "BrainPowers AI is thinking...";

  chatBox.appendChild(botMessage);

  chatBox.scrollTop =
    chatBox.scrollHeight;

  try{

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          contents:[
            {
              parts:[
                {
                  text:text
                }
              ]
            }
          ]

        })

      }
    );

    const data = await response.json();

    const reply =
      data.candidates[0]
      .content.parts[0].text;

    botMessage.innerText = reply;

  }
  catch(error){

    botMessage.innerText =
      "Error getting AI response.";

  }

  chatBox.scrollTop =
    chatBox.scrollHeight;

}

function newChat(){

  const chatBox =
    document.getElementById("chatBox");

  chatBox.innerHTML = `
    <div class="message bot">
      New chat started 🚀
    </div>
  `;

}

document
.getElementById("userInput")
.addEventListener("keypress",
function(event){

  if(event.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
